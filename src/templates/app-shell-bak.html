<div class="min-h-screen bg-gray-50 flex flex-col">
  <header class="flex flex-wrap sm:justify-start sm:flex-nowrap z-40 w-full bg-white border-b border-gray-200 text-sm py-2 sm:py-0">
    <nav class="relative max-w-[85rem] w-full mx-auto px-4 sm:flex sm:items-center sm:justify-between" aria-label="Global">
      
      <div class="flex items-center justify-between py-3">
        <span class="font-bold text-xl text-gray-800 font-mono">Arthos-Code</span>
      </div>
      
      <div class="flex flex-wrap items-center justify-start sm:justify-end py-2 sm:py-0 gap-y-2 space-x-1 sm:space-x-4">
        <button id="nav-home-btn" class="py-3 px-3 sm:px-4 inline-flex items-center gap-x-2 text-sm font-medium border-b-2 border-blue-600 text-blue-600 whitespace-nowrap">
          Home
        </button>
        <button id="nav-projects-btn" class="py-3 px-3 sm:px-4 inline-flex items-center gap-x-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-blue-600 whitespace-nowrap">
          Projekte
        </button>
        <button id="nav-users-btn" class="py-3 px-3 sm:px-4 inline-flex items-center gap-x-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-blue-600 whitespace-nowrap">
          Benutzer managen
        </button>
        
        <div class="flex items-center space-x-3 pl-2 sm:pl-4 border-l border-gray-200 h-5 my-2">
          <span class="text-xs text-gray-400 font-mono">User: {{username}}</span>
          <button id="logout-btn" class="py-1.5 px-3 inline-flex items-center gap-x-2 text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50">
            Abmelden
          </button>
        </div>
      </div>

    </nav>
  </header>

  <main id="subview-container" class="flex-grow max-w-[85rem] w-full mx-auto p-4 sm:p-6 lg:p-8">
  </main>
</div>
