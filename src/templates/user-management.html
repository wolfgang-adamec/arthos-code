<div class="max-w-4xl mx-auto space-y-6">
  
  <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-4 sm:p-7 dark:bg-gray-800 dark:border-gray-700">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-gray-800 dark:text-white">Bestehende Benutzer</h2>
      
      <button type="button" id="btn-toggle-user-form" class="py-2 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50">
        + Neuen Benutzer anlegen
      </button>
    </div>

    <div class="flex flex-col">
      <div class="-m-1.5 overflow-x-auto">
        <div class="p-1.5 min-w-full inline-block align-middle">
          <div class="border rounded-lg overflow-hidden dark:border-gray-700">
            <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
              <thead class="bg-gray-50 dark:bg-gray-700">
                <tr>
                  <th scope="col" class="px-6 py-3 text-start text-xs font-medium text-gray-500 uppercase dark:text-gray-400">ID</th>
                  <th scope="col" class="px-6 py-3 text-start text-xs font-medium text-gray-500 uppercase dark:text-gray-400">Benutzername</th>
                </tr>
              </thead>
              <tbody id="user-table-body" class="divide-y divide-gray-200 dark:divide-gray-700">
                <tr>
                  <td colspan="2" class="px-6 py-4 text-center text-sm text-gray-500 italic">Lade Benutzer...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="user-form-container" class="bg-white border border-gray-200 rounded-xl shadow-sm p-4 sm:p-7 dark:bg-gray-800 dark:border-gray-700" hidden>
    <div class="text-center mb-5">
      <h2 class="text-lg font-bold text-gray-800 dark:text-white">Neuen Benutzer registrieren</h2>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label for="new-username" class="block text-sm mb-2 dark:text-white">Benutzername</label>
        <input type="text" id="new-username" class="py-3 px-4 block w-full border-gray-250 rounded-lg text-sm focus:border-blue-500" autocomplete="off">
      </div>
      <div>
        <label for="new-password" class="block text-sm mb-2 dark:text-white">Passwort</label>
        <input type="password" id="new-password" class="py-3 px-4 block w-full border-gray-250 rounded-lg text-sm focus:border-blue-500">
      </div>
    </div>

    <div id="form-message" class="hidden text-sm p-2 rounded-lg mt-4"></div>

    <div class="mt-4 flex justify-end gap-x-2">
      <button type="button" id="btn-cancel-user" class="py-2 px-4 inline-flex justify-center items-center text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 hover:bg-gray-50">
        Abbrechen
      </button>
      <button type="button" id="btn-save-user" class="py-2 px-4 inline-flex justify-center items-center text-sm font-semibold rounded-lg bg-blue-600 text-white hover:bg-blue-700">
        Speichern
      </button>
    </div>
  </div>

</div>
