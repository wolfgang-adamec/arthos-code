<div class="max-w-4xl mx-auto space-y-6 relative">
  
  <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-4 sm:p-7 dark:bg-gray-800 dark:border-gray-700">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-gray-800 dark:text-white">Bestehende Benutzer</h2>
      
      <button type="button" id="btn-toggle-user-form" class="py-2 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg bg-blue-600 text-white hover:bg-blue-700">
        + Neuen Benutzer anlegen
      </button>
    </div>

    <div class="flex flex-col">
      <div class="-m-1.5 overflow-x-auto">
        <div class="p-1.5 min-w-full inline-block align-middle">
          <div class="border rounded-lg overflow-hidden dark:border-gray-700">
            <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
              <thead class="bg-gray-50 dark:bg-gray-700">
                <tr>
                  <th scope="col" class="px-6 py-3 text-start text-xs font-medium text-gray-500 uppercase dark:text-gray-400">ID</th>
                  <th scope="col" class="px-6 py-3 text-start text-xs font-medium text-gray-500 uppercase dark:text-gray-400">Benutzername</th>
                </tr>
              </thead>
              <tbody id="user-table-body" class="divide-y divide-gray-200 dark:divide-gray-700">
                <tr>
                  <td colspan="2" class="px-6 py-4 text-center text-sm text-gray-500 italic">Lade Benutzer...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="user-form-container" class="fixed inset-0 z-50 bg-white dark:bg-gray-900 transform translate-y-full invisible transition-all duration-300 ease-out p-6 sm:p-12 overflow-y-auto">
    
    <div class="max-w-md mx-auto mt-10 space-y-8">
      
      <div class="text-center">
        <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white">Neuen Benutzer registrieren</h2>
        <p class="text-sm text-gray-500 mt-2">Erstellen Sie ein neues Konto im System.</p>
      </div>

      <div class="space-y-4">
        <div>
          <label for="new-username" class="block text-sm font-medium mb-2 dark:text-white">Benutzername</label>
          <input type="text" id="new-username" class="py-3 px-4 block w-full border-gray-250 rounded-xl text-base focus:border-blue-500 focus:ring-blue-500 dark:bg-slate-900 dark:border-gray-750 dark:text-gray-400" autocomplete="off">
        </div>
        <div>
          <label for="new-password" class="block text-sm font-medium mb-2 dark:text-white">Passwort</label>
          <input type="password" id="new-password" class="py-3 px-4 block w-full border-gray-250 rounded-xl text-base focus:border-blue-500 focus:ring-blue-500 dark:bg-slate-900 dark:border-gray-750 dark:text-gray-400">
        </div>
      </div>

      <div id="form-message" class="hidden text-sm p-3 rounded-xl mt-4"></div>

      <div class="grid grid-cols-2 gap-4 pt-4">
        <button type="button" id="btn-cancel-user" class="py-3 px-4 inline-flex justify-center items-center text-sm font-semibold rounded-xl border border-gray-200 bg-white text-gray-800 hover:bg-gray-50 shadow-sm dark:bg-slate-900 dark:border-gray-700 dark:text-white dark:hover:bg-gray-800">
          Abbrechen
        </button>
        <button type="button" id="btn-save-user" class="py-3 px-4 inline-flex justify-center items-center text-sm font-semibold rounded-xl bg-blue-600 text-white hover:bg-blue-700 shadow-sm">
          Speichern
        </button>
      </div>

    </div>

  </div>

</div>
