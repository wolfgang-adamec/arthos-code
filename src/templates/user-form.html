<div class="max-w-md mx-auto bg-white border border-gray-200 rounded-xl shadow-sm p-4 sm:p-7 dark:bg-gray-800 dark:border-gray-700">
  <div class="text-center">
    <h2 class="block text-2xl font-bold text-gray-850 dark:text-white">Neuen Benutzer anlegen</h2>
  </div>

  <div class="mt-5">
    <div class="grid gap-y-4">
      
      <div>
        <label for="new-username" class="block text-sm mb-2 dark:text-white">Benutzername</label>
        <input type="text" id="new-username" class="py-3 px-4 block w-full border-gray-250 rounded-lg text-sm focus:border-blue-500" autocomplete="off">
      </div>

      <div>
        <label for="new-password" class="block text-sm mb-2 dark:text-white">Passwort</label>
        <input type="password" id="new-password" class="py-3 px-4 block w-full border-gray-250 rounded-lg text-sm focus:border-blue-500">
      </div>

      <div id="form-message" class="hidden text-sm p-2 rounded-lg"></div>

      <button type="button" id="btn-save-user" class="w-full py-3 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg bg-blue-600 text-white hover:bg-blue-700">
        Benutzer speichern
      </button>
      
    </div>
  </div>
</div>
