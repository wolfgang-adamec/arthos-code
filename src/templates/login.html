<div class="max-w-md mx-auto my-12 bg-white border border-gray-200 rounded-xl shadow-sm p-6">
  <h2 class="text-xl font-bold text-gray-800 mb-4 font-mono text-center">Arthos-Code Login</h2>
  
  <div class="space-y-4">
    <div>
      <label for="username" class="block text-sm font-medium mb-1 text-gray-700">Benutzername</label>
      <input type="text" id="username" class="py-2 px-3 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500">
    </div>
    
    <div>
      <label for="password" class="block text-sm font-medium mb-1 text-gray-700">Passwort</label>
      <input type="password" id="password" class="py-2 px-3 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500">
    </div>
    
    <button id="login-click-btn" class="w-full py-2 px-3 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700">
      Einloggen
    </button>
    
    <p id="login-error" class="text-sm text-red-600 hidden mt-2 text-center"></p>
  </div>
</div>
